services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: convkit
      POSTGRES_USER: convkit
      POSTGRES_PASSWORD: convkit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CONVKIT_CONFIG: /app/config/server.yaml
    depends_on:
      - postgres
      - redis
      - nats

volumes:
  postgres_data:
